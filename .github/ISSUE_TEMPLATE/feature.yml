name: Feature
description: A new capability or enhancement.
labels: ["type:feat"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: Which worktree will own this? Required.
      options:
        - gui
        - manager
        - proto
        - shared
        - infra
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user-visible problem does this solve? Why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What, in outline, is the approach? Link to ADRs if relevant.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Testable conditions that prove this is done. An agent working on this issue writes tests for each criterion.
      placeholder: |
        - [ ] Behavior X works end-to-end from the UI
        - [ ] Unit tests cover Y edge case
        - [ ] ADR updated if a decision changed
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What is explicitly NOT part of this work, to prevent scope creep?
